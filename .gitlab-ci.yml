stages:
  - install
  - lint
  - build
  - test
  - deploy

variables:
  NODE_VERSION: "20"
  CACHE_KEY: "storybook-node-modules"

cache:
  key: ${CACHE_KEY}
  paths:
    - node_modules/
    - .yarn/cache

# ============================================================================
# Install Dependencies
# ============================================================================

install_dependencies:
  stage: install
  image: node:${NODE_VERSION}-alpine
  script:
    - yarn install --frozen-lockfile
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  only:
    - branches
    - merge_requests

# ============================================================================
# Lint & Type Check
# ============================================================================

lint:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  needs: ["install_dependencies"]
  script:
    - yarn lint
  allow_failure: false

type_check:
  stage: lint
  image: node:${NODE_VERSION}-alpine
  needs: ["install_dependencies"]
  script:
    - yarn build
  allow_failure: false

# ============================================================================
# Build Storybook
# ============================================================================

build_storybook:
  stage: build
  image: node:${NODE_VERSION}-alpine
  needs: ["install_dependencies"]
  script:
    - yarn build-storybook
  artifacts:
    paths:
      - storybook-static/
    expire_in: 1 day
  only:
    - branches
    - merge_requests

# ============================================================================
# Accessibility & Component Tests
# ============================================================================

test_stories:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs: ["install_dependencies"]
  before_script:
    - apk add --no-cache chromium
  script:
    - echo "Running Storybook story tests with accessibility checks..."
    - yarn test:ci
  artifacts:
    reports:
      junit: coverage/junit.xml
    paths:
      - coverage/
    expire_in: 1 day
  allow_failure: false
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'

# ============================================================================
# Generate Coverage Report
# ============================================================================

coverage_report:
  stage: test
  image: node:${NODE_VERSION}-alpine
  needs: ["test_stories"]
  script:
    - echo "Coverage report generated"
  artifacts:
    paths:
      - coverage/
    expire_in: 30 days
  only:
    - merge_requests

# ============================================================================
# Deploy Storybook (Optional - for production)
# ============================================================================

deploy_storybook:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  needs: ["build_storybook"]
  script:
    - echo "Deploying Storybook static build..."
    - echo "Storybook static files are ready in storybook-static/"
  artifacts:
    paths:
      - storybook-static/
    expire_in: 30 days
  only:
    - main
    - master
  when: on_success

# ============================================================================
# MR Pipeline
# ============================================================================

merge_request_pipeline:
  stage: build
  image: node:${NODE_VERSION}-alpine
  needs: ["install_dependencies", "lint", "type_check"]
  script:
    - echo "All checks passed for MR"
  only:
    - merge_requests
